stages:
  - deploy


deploy:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client rsync
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVKEY_SUP" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - ssh-keyscan -H $SUP_SERVER >> ~/.ssh/known_hosts
  script:
    # Синхронизируем файлы из репозитория в папку на сервере
    - rsync -avz --delete ./ $SSH_LOGIN_SUP@$SUP_SERVER:/var/www/html/mysite.com/
    # Если требуется перезапустить веб-сервер:
    # - ssh $SERVER_USER@$SERVER_HOST "systemctl restart nginx"
  only:
    - main
